<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodieShare - 萬能美食清單</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        #auth-screen.fade-out { opacity: 0; pointer-events: none; }
        .transition-all { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-[#F8F9FB] text-slate-900 min-h-screen pb-20 overflow-x-hidden">

    <!-- Auth Screen (Account System) -->
    <div id="auth-screen" class="fixed inset-0 z-[200] bg-slate-900 flex items-center justify-center p-6 transition-all duration-700">
        <div class="bg-white rounded-[3rem] p-10 w-full max-w-sm shadow-2xl text-center">
            <div class="w-16 h-16 bg-orange-500 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-xl shadow-orange-500/20">
                <i data-lucide="utensils" class="w-8 h-8 text-white"></i>
            </div>
            <h1 class="text-3xl font-black mb-2">FoodieShare</h1>
            <p class="text-slate-400 text-xs font-black uppercase tracking-widest mb-10">您的個人美食探店終端</p>
            
            <div class="space-y-4">
                <button onclick="loginAsAnonymous()" class="w-full py-4 bg-slate-50 text-slate-600 rounded-2xl font-black hover:bg-slate-100 transition-all flex items-center justify-center gap-3">
                    <i data-lucide="user-minus" class="w-4 h-4"></i>
                    匿名模式進入
                </button>
                <div class="relative py-4">
                    <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-100"></div></div>
                    <div class="relative flex justify-center text-[10px] font-black uppercase text-slate-300"><span class="bg-white px-4">或者</span></div>
                </div>
                <div class="space-y-2">
                    <input id="login-username" onkeyup="if(event.key === 'Enter') loginWithAccount()" placeholder="輸入用戶名稱" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-4 focus:ring-orange-500/10 focus:border-orange-500 transition-all font-bold text-center">
                    <button onclick="loginWithAccount()" class="w-full py-4 bg-orange-500 text-white rounded-2xl font-black shadow-xl shadow-orange-500/20 hover:bg-orange-600 transition-all active:scale-95 flex items-center justify-center gap-3">
                        <i data-lucide="user-check" class="w-4 h-4"></i>
                        帳號登入
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Header -->
    <header class="bg-white/80 backdrop-blur-md border-b border-slate-100 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-orange-500 rounded-xl flex items-center justify-center shadow-lg shadow-orange-200">
                        <i data-lucide="utensils" class="w-4 h-4 text-white"></i>
                    </div>
                    <span class="text-lg font-black tracking-tighter">FoodieShare</span>
                </div>
                <!-- 用戶顯示 -->
                <div class="hidden md:flex items-center gap-3 pl-4 border-l border-slate-100">
                    <button onclick="document.getElementById('avatar-upload-input').click()" class="relative group w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center overflow-hidden border-2 border-transparent hover:border-orange-500 transition-all">
                        <img id="user-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=guest" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                            <i data-lucide="camera" class="w-3 h-3 text-white"></i>
                        </div>
                    </button>
                    <input type="file" id="avatar-upload-input" class="hidden" accept="image/*">
                    <div class="flex flex-col">
                        <span id="display-username" class="text-xs font-black text-slate-900 leading-none mb-1">Guest</span>
                        <button onclick="logout()" class="text-[9px] font-bold text-rose-500 uppercase tracking-widest text-left hover:underline">登出系統</button>
                    </div>
                </div>
                <!-- 等級稱號 (Gamification) -->
                <div id="user-level" class="hidden sm:flex bg-orange-50 text-orange-600 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest border border-orange-100">
                    美食初心者 🐣
                </div>
            </div>

            <div class="flex items-center gap-6">
                <!-- 智能心情拉霸機按鈕 (Smart Discovery) -->
                <button onclick="spinLuckyDraw()" class="group relative bg-white border border-slate-100 p-2.5 rounded-xl shadow-sm hover:border-orange-200 transition-all active:scale-90">
                    <i data-lucide="sparkles" class="w-5 h-5 text-orange-400 group-hover:animate-spin"></i>
                    <span class="absolute -top-12 left-1/2 -translate-x-1/2 bg-slate-900 text-white text-[10px] font-black px-3 py-1.5 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none">
                        今天吃什麼？
                    </span>
                </button>

                <div class="hidden lg:flex flex-col items-end gap-1">
                    <div class="flex items-center gap-2">
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">征服進度</span>
                        <span id="progress-text" class="text-xs font-black text-orange-500">0%</span>
                    </div>
                    <div class="w-32 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                        <div id="progress-bar" class="h-full bg-orange-500 transition-all duration-500" style="width: 0%"></div>
                    </div>
                </div>
                <button onclick="toggleModal(true)" class="bg-slate-900 text-white px-5 py-2.5 rounded-xl text-xs font-black hover:bg-slate-800 transition-all active:scale-95 flex items-center gap-2">
                    <i data-lucide="plus" class="w-4 h-4"></i> 發布分享
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-12">
        <!-- Stats Panel -->
        <section class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-16">
            <div class="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm">
                <div class="w-10 h-10 bg-blue-50 text-blue-500 rounded-2xl flex items-center justify-center mb-6">
                    <i data-lucide="trending-up" class="w-5 h-5"></i>
                </div>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">最熱門類別</p>
                <h3 id="stat-top-category" class="text-2xl font-black text-slate-900">載入中...</h3>
            </div>
            <div class="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm">
                <div class="w-10 h-10 bg-orange-50 text-orange-500 rounded-2xl flex items-center justify-center mb-6">
                    <i data-lucide="calendar" class="w-5 h-5"></i>
                </div>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">本月探店次數</p>
                <h3 id="stat-monthly" class="text-2xl font-black text-slate-900">0 次</h3>
            </div>
            <div class="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm">
                <div class="w-10 h-10 bg-rose-50 text-rose-500 rounded-2xl flex items-center justify-center mb-6">
                    <i data-lucide="heart" class="w-5 h-5"></i>
                </div>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">最常出現心情</p>
                <h3 id="stat-mood" class="text-2xl font-black text-slate-900">無</h3>
            </div>
            <div class="bg-slate-900 p-8 rounded-[2rem] text-white shadow-xl shadow-slate-200">
                <div class="w-10 h-10 bg-white/10 text-white rounded-2xl flex items-center justify-center mb-6">
                    <i data-lucide="layout-grid" class="w-5 h-5"></i>
                </div>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">總分享貼文</p>
                <h3 id="stat-total" class="text-2xl font-black">0 篇</h3>
            </div>
        </section>

        <!-- Filters Bar -->
        <div class="flex flex-col lg:flex-row lg:items-center justify-between gap-6 mb-10">
            <div class="flex flex-col md:flex-row md:items-center gap-4">
                <div id="category-filters" class="p-1.5 bg-white border border-slate-100 rounded-2xl flex items-center gap-1 overflow-x-auto no-scrollbar">
                    <!-- Category buttons inject here -->
                </div>

                <!-- Stats summary -->
                <div class="hidden sm:flex items-center gap-4 px-6 py-3 bg-white border border-slate-100 rounded-2xl shadow-sm font-black">
                    <div class="flex items-center gap-2 text-[10px] text-slate-400 uppercase tracking-widest">
                        <div class="w-2 h-2 rounded-full bg-orange-500"></div>
                        Active: <span id="summary-active" class="text-slate-900">0</span>
                    </div>
                    <div class="w-[1px] h-3 bg-slate-100"></div>
                    <div class="flex items-center gap-2 text-[10px] text-slate-400 uppercase tracking-widest">
                        <div class="w-2 h-2 rounded-full bg-slate-300"></div>
                        Done: <span id="summary-done" class="text-slate-900">0</span>
                    </div>
                </div>
            </div>

            <!-- Status Filters -->
            <div id="status-filters" class="p-1.5 bg-white border border-slate-100 rounded-2xl flex items-center gap-1 shrink-0">
                <button onclick="setStatusFilter('全部')" class="status-btn px-5 py-2 rounded-xl text-xs font-black transition-all bg-orange-500 text-white shadow-lg whitespace-nowrap" data-value="全部">全部</button>
                <button onclick="setStatusFilter('active')" class="status-btn px-5 py-2 rounded-xl text-xs font-black transition-all text-slate-400 hover:text-slate-600 hover:bg-slate-50 whitespace-nowrap" data-value="active">只看 active</button>
                <button onclick="setStatusFilter('done')" class="status-btn px-5 py-2 rounded-xl text-xs font-black transition-all text-slate-400 hover:text-slate-600 hover:bg-slate-50 whitespace-nowrap" data-value="done">只看 done</button>
            </div>
        </div>

        <!-- Grid -->
        <div id="records-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            <!-- Cards inject here -->
        </div>
    </main>

    <!-- Lucky Draw Modal (Smart Discovery) -->
    <div id="lucky-modal" class="fixed inset-0 z-[110] hidden items-center justify-center p-6 bg-slate-900/40 backdrop-blur-xl">
        <div class="bg-white rounded-[3rem] p-10 w-full max-sm shadow-2xl relative text-center">
            <div class="w-20 h-20 bg-orange-100 text-orange-600 rounded-3xl flex items-center justify-center mx-auto mb-6 animate-bounce">
                <i data-lucide="sparkles" class="w-10 h-10"></i>
            </div>
            <h3 class="text-2xl font-black mb-2 text-slate-400 uppercase tracking-widest text-xs">為您抽選的今日驚喜</h3>
            <h2 id="lucky-result-name" class="text-3xl font-black mb-6 text-slate-900 leading-tight">...</h2>
            
            <div id="lucky-result-card" class="bg-slate-50 rounded-2xl p-6 mb-8 border border-slate-100 text-left">
                <p id="lucky-result-content" class="text-slate-500 text-sm italic font-medium">...</p>
            </div>

            <div class="flex gap-4">
                <button onclick="toggleLuckyModal(false)" class="flex-1 py-4 font-black text-slate-400 hover:text-slate-600 transition-all uppercase tracking-widest text-[10px]">下次再說</button>
                <button onclick="toggleLuckyModal(false)" class="flex-1 py-4 bg-slate-900 text-white rounded-2xl font-black shadow-xl hover:bg-slate-800 transition-all active:scale-95 text-[10px] uppercase tracking-widest">出發！</button>
            </div>
        </div>
    </div>

    <!-- Post Modal -->
    <div id="post-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-6 bg-slate-900/60 backdrop-blur-md">
        <div class="bg-white rounded-[3rem] p-10 w-full max-w-lg shadow-2xl relative overflow-y-auto max-h-[90vh]">
            <h3 class="text-3xl font-black mb-8">新增美食發現</h3>
            <form id="post-form" class="space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-2">餐廳名稱</label>
                    <input required id="modal-restaurant" name="restaurant" placeholder="例如：巷口老牌牛肉麵" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:ring-4 focus:ring-orange-500/10 focus:border-orange-500 transition-all font-bold">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-2">類別</label>
                        <select id="modal-category" name="category" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none font-bold">
                            <option value="中式">中式</option>
                            <option value="日式">日式</option>
                            <option value="西式">西式</option>
                            <option value="咖啡甜點">咖啡甜點</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-2">今日心情 (Mood Tags)</label>
                        <select id="modal-mood" name="mood" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none font-bold">
                            <option value="犒賞自己">犒賞自己 💎</option>
                            <option value="快餐解決">快餐解決 ⚡</option>
                            <option value="適合約會">適合約會 💕</option>
                            <option value="心情大好">心情大好 ☀️</option>
                            <option value="不想努力">不想努力 🛌</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-2">圖片上傳</label>
                    <div class="flex flex-col gap-3">
                        <input type="file" id="modal-image-file" accept="image/*" class="hidden">
                        <button type="button" onclick="document.getElementById('modal-image-file').click()" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none font-bold text-slate-400 hover:text-orange-500 hover:border-orange-500 transition-all flex items-center justify-center gap-2">
                            <i data-lucide="image" class="w-4 h-4"></i>
                            <span>選擇圖片</span>
                        </button>
                        <div id="image-preview" class="hidden w-full aspect-video rounded-2xl overflow-hidden border border-slate-100 relative group">
                            <img id="preview-img" src="" class="w-full h-full object-cover">
                            <button type="button" onclick="clearImagePreview()" class="absolute top-2 right-2 w-8 h-8 bg-slate-900/50 backdrop-blur-md text-white rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                <i data-lucide="x" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-2">心得分享</label>
                    <textarea required id="modal-content" name="content" placeholder="味道如何？推薦點什麼？" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none h-32 font-bold resize-none"></textarea>
                </div>

                <div class="flex gap-4 pt-6">
                    <button type="button" onclick="toggleModal(false)" class="flex-1 py-4 font-black text-slate-400 hover:text-slate-600 transition-all">取消</button>
                    <button type="submit" class="flex-1 py-4 bg-orange-500 text-white rounded-2xl font-black shadow-xl shadow-orange-100 hover:bg-orange-600 transition-all active:scale-95">發布分享</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // --- Configuration ---
        const APPS_SCRIPT_URL = "PASTE_YOUR_APPS_SCRIPT_URL_HERE";

        const CATEGORIES = ['中式', '日式', '西式', '咖啡甜點', '其他'];
        const STORAGE_KEY = "records"; // Rule 5: Fixed key
        let currentUserId = localStorage.getItem('foodie_user_id') || null;
        let currentCategory = '全部';
        let currentStatus = '全部';

        let currentUploadedImage = null;

        const MOOD_EMOJIS = {
            '犒賞自己': '💎',
            '快餐解決': '⚡',
            '適合約會': '💕',
            '心情大好': '☀️',
            '不想努力': '🛌'
        };

        // --- Backend Sync Helper ---
        async function syncToSheet(payload) {
            if (APPS_SCRIPT_URL.includes("PASTE")) return;
            try {
                await fetch(APPS_SCRIPT_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify(payload)
                });
            } catch (e) { console.warn(e); }
        }

        // --- Core Functions (Required by Rule 6) ---

        /**
         * 1. 載入資料 (Rule 6)
         */
        function loadData() {
            const raw = localStorage.getItem(STORAGE_KEY);
            return raw ? JSON.parse(raw) : [];
        }

        /**
         * 2. 儲存單筆資料 (Rule 6)
         */
        function saveData(newRecord) {
            const data = loadData();
            // Rule 4: Detailed ID and createdAt format
            const recordWithMeta = {
                id: Date.now() + "_" + Math.random().toString(36).slice(2,6),
                createdAt: new Date().toISOString(),
                status: "active", // Rule 4: default active
                ...newRecord
            };
            data.unshift(recordWithMeta);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            syncToSheet({ action: "create", record: recordWithMeta });
            return recordWithMeta;
        }

        /**
         * 3. 渲染列表 (Rule 6)
         */
        function renderList() {
            const allData = loadData();
            const grid = document.getElementById('records-grid');
            
            // Filter by user first (to keep account simulation)
            const data = allData;
            
            // Filter by category and status
            let filtered = data;
            if (currentCategory !== '全部') {
                filtered = filtered.filter(r => r.category === currentCategory);
            }
            if (currentStatus !== '全部') {
                filtered = filtered.filter(r => r.status === currentStatus);
            }

            // Sort: active first
            filtered.sort((a, b) => {
                if (a.status === 'active' && b.status === 'done') return -1;
                if (a.status === 'done' && b.status === 'active') return 1;
                return new Date(b.createdAt) - new Date(a.createdAt);
            });

            // Update Stats Summary (Only for current user's progress)
            const myData = data.filter(r => r.userId === currentUserId);
            updateStats(myData);

            // Render cards
            grid.innerHTML = '';
            if (filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-20 text-center text-slate-300 font-bold">目前還沒有任何美食紀錄</div>`;
                return;
            }

            filtered.forEach(record => {
                const isDone = record.status === 'done';
                const hasImage = !!record.imageData;
                const isOwner = record.userId === currentUserId;
                const card = document.createElement('article');
                card.className = `group bg-white rounded-[2.5rem] overflow-hidden border transition-all duration-500 hover:shadow-2xl hover:-translate-y-2 relative flex flex-col ${isDone ? 'border-slate-100 grayscale' : 'border-slate-100 shadow-sm'}`;
                
                const authorId = record.userId || 'guest';
                
                card.innerHTML = `
                    ${isDone ? `
                    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-20 pointer-events-none opacity-20">
                        <div class="border-8 border-slate-900 px-6 py-2 rounded-xl rotate-[-15deg]">
                            <span class="text-4xl font-black text-slate-900 uppercase tracking-widest">已造訪</span>
                        </div>
                    </div>` : ''}

                    ${hasImage ? `
                    <div class="relative aspect-[4/5] overflow-hidden shrink-0">
                        <img src="${record.imageData}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-1000">
                        ${isDone ? '<div class="absolute inset-0 bg-white/40 backdrop-blur-[1px] z-10"></div>' : ''}
                        <div class="absolute top-6 left-6 flex flex-col gap-2 z-20">
                            <span class="px-4 py-2 rounded-2xl text-[10px] font-black uppercase tracking-widest border backdrop-blur-md flex items-center gap-2 shadow-sm ${record.status === 'active' ? 'bg-orange-50 text-orange-600 border-orange-100' : 'bg-slate-100 text-slate-400 border-slate-200'}">
                                <i data-lucide="${record.status === 'active' ? 'bookmark' : 'check-circle-2'}" class="w-3 h-3"></i>
                                ${record.status === 'active' ? '待造訪' : '已造訪'}
                            </span>
                            ${record.mood ? `
                            <span class="px-4 py-2 rounded-2xl text-[10px] font-black uppercase tracking-widest border backdrop-blur-md bg-white/80 text-slate-600 shadow-sm flex items-center gap-2">
                                ${MOOD_EMOJIS[record.mood] || '✨'} ${record.mood}
                            </span>
                            ` : ''}
                        </div>
                        <div class="absolute bottom-6 right-6 flex items-center gap-2 z-20">
                            <button onclick="handleLike('${record.id}')" class="flex items-center gap-2 px-3 py-2 bg-white/90 backdrop-blur-md rounded-xl shadow-lg transition-all group/like">
                                <i data-lucide="thumbs-up" class="w-3 h-3 text-orange-500 fill-orange-500/0"></i>
                                <span class="text-[10px] font-black text-slate-600">${record.likes || 0}</span>
                            </button>
                            <button onclick="handleDislike('${record.id}')" class="flex items-center gap-2 px-3 py-2 bg-white/90 backdrop-blur-md rounded-xl shadow-lg transition-all group/dislike">
                                <i data-lucide="thumbs-down" class="w-3 h-3 text-slate-400 fill-slate-400/0"></i>
                                <span class="text-[10px] font-black text-slate-600">${record.dislikes || 0}</span>
                            </button>
                        </div>
                    </div>
                    ` : `
                    <div class="pt-8 px-8 flex justify-between items-start shrink-0">
                        <div class="flex flex-col gap-2">
                            <span class="px-4 py-2 rounded-2xl text-[10px] font-black uppercase tracking-widest border border-slate-100 bg-slate-50 flex items-center gap-2 shadow-sm ${record.status === 'active' ? 'text-orange-600' : 'text-slate-400'}">
                                <i data-lucide="${record.status === 'active' ? 'bookmark' : 'check-circle-2'}" class="w-3 h-3"></i>
                                ${record.status === 'active' ? '待造訪' : '已造訪'}
                            </span>
                            ${record.mood ? `
                            <span class="px-4 py-2 rounded-2xl text-[10px] font-black uppercase tracking-widest border border-slate-100 bg-white text-slate-600 shadow-sm flex items-center gap-2 w-fit">
                                ${MOOD_EMOJIS[record.mood] || '✨'} ${record.mood}
                            </span>
                            ` : ''}
                        </div>
                        <div class="flex items-center gap-2">
                            <button onclick="handleLike('${record.id}')" class="flex items-center gap-1.5 px-3 py-1.5 hover:bg-slate-50 rounded-xl transition-all">
                                <i data-lucide="thumbs-up" class="w-3 h-3 text-orange-500"></i>
                                <span class="text-[10px] font-black text-slate-600">${record.likes || 0}</span>
                            </button>
                            <button onclick="handleDislike('${record.id}')" class="flex items-center gap-1.5 px-3 py-1.5 hover:bg-slate-50 rounded-xl transition-all">
                                <i data-lucide="thumbs-down" class="w-3 h-3 text-slate-400"></i>
                                <span class="text-[10px] font-black text-slate-600">${record.dislikes || 0}</span>
                            </button>
                        </div>
                    </div>
                    `}

                    <div class="p-8 flex-1 flex flex-col">
                        <div class="flex items-center justify-between mb-4">
                            <div class="flex items-center gap-2">
                                <img src="${getUserAvatar(authorId)}" class="w-5 h-5 rounded-full border border-slate-100 object-cover">
                                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">${record.userId === 'anonymous' ? 'Anonymous Guest' : record.userId}</span>
                            </div>
                            <span class="text-[10px] font-bold text-slate-300">${new Date(record.createdAt).toLocaleDateString()}</span>
                        </div>
                        <h4 class="text-xl font-black mb-1 text-slate-900 leading-tight transition-all ${isDone ? 'line-through opacity-70' : ''}">${record.restaurant}</h4>
                         <span class="text-[10px] font-black text-orange-500 uppercase tracking-widest mb-4 block">${record.category}</span>
                        <p class="text-slate-500 text-sm leading-relaxed mb-8 line-clamp-2 font-medium transition-all ${isDone ? 'line-through opacity-50' : ''}">${record.content}</p>
                        
                        <div class="mt-auto flex items-center justify-between pt-6 border-t border-slate-50">
                            <button onclick="toggleStatus('${record.id}')" class="flex items-center gap-2 px-5 py-2.5 rounded-xl transition-all group/btn ${isDone ? 'bg-slate-900 text-white' : 'bg-slate-50 hover:bg-slate-100'}">
                                <span class="text-[10px] font-black uppercase tracking-widest ${isDone ? 'text-white' : 'text-slate-400'}">切換探店狀態</span>
                                <i data-lucide="arrow-right" class="w-3 h-3 ${isDone ? 'rotate-180' : ''}"></i>
                            </button>
                            ${isOwner ? `
                            <button onclick="deleteRecord('${record.id}')" class="text-slate-300 hover:text-rose-500 transition-colors">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                            ` : ''}
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
            lucide.createIcons();
        }

        // --- Helper Functions ---

        function updateStats(data) {
            const total = data.length;
            const activeCount = data.filter(r => r.status === 'active').length;
            const doneCount = data.filter(r => r.status === 'done').length;
            const progress = total > 0 ? Math.round((doneCount / total) * 100) : 0;

            let levelTitle = "美食初心者 🐣";
            if (doneCount >= 8) levelTitle = "靈魂老饕 👑";
            else if (doneCount >= 4) levelTitle = "巷弄特派員 🔍";
            document.getElementById('user-level').textContent = levelTitle;

            document.getElementById('stat-total').textContent = `${total} 篇`;
            document.getElementById('stat-monthly').textContent = `${data.filter(r => new Date(r.createdAt).getMonth() === new Date().getMonth()).length} 次`;
            
            const cats = {};
            const moods = {};
            data.forEach(r => {
                cats[r.category] = (cats[r.category] || 0) + 1;
                if (r.mood) moods[r.mood] = (moods[r.mood] || 0) + 1;
            });
            const topCat = Object.entries(cats).sort((a,b) => b[1]-a[1])[0]?.[0] || '無';
            const topMood = Object.entries(moods).sort((a,b) => b[1]-a[1])[0]?.[0] || '無';
            
            document.getElementById('stat-top-category').textContent = topCat;
            document.getElementById('stat-mood').textContent = topMood ? `${MOOD_EMOJIS[topMood] || ''} ${topMood}` : '無';

            document.getElementById('progress-text').textContent = `${progress}%`;
            document.getElementById('progress-bar').style.width = `${progress}%`;
            document.getElementById('summary-active').textContent = activeCount;
            document.getElementById('summary-done').textContent = doneCount;
        }

        function spinLuckyDraw() {
            const allData = loadData();
            const pool = allData.filter(r => r.status === 'active' && r.userId === currentUserId);
            
            if (pool.length === 0) {
                alert('您的名單中目前沒有待造訪的餐廳喔！');
                return;
            }

            const lucky = pool[Math.floor(Math.random() * pool.length)];
            document.getElementById('lucky-result-name').textContent = lucky.restaurant;
            document.getElementById('lucky-result-content').textContent = lucky.content || "這間餐廳看起來很不錯，出發吧！";
            toggleLuckyModal(true);
        }

        function toggleLuckyModal(show) {
            const modal = document.getElementById('lucky-modal');
            if (show) {
                modal.classList.remove('hidden');
                modal.classList.add('flex');
                lucide.createIcons();
            } else {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }
        }

        function toggleModal(show) {
            const modal = document.getElementById('post-modal');
            if (show) {
                modal.classList.remove('hidden');
                modal.classList.add('flex');
                lucide.createIcons();
            } else {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                clearImagePreview();
            }
        }

        function clearImagePreview() {
            currentUploadedImage = null;
            document.getElementById('modal-image-file').value = '';
            document.getElementById('image-preview').classList.add('hidden');
            document.getElementById('preview-img').src = '';
        }

        document.getElementById('modal-image-file').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                currentUploadedImage = event.target.result;
                const preview = document.getElementById('image-preview');
                const previewImg = document.getElementById('preview-img');
                preview.classList.remove('hidden');
                previewImg.src = currentUploadedImage;
            };
            reader.readAsDataURL(file);
        });

        function toggleStatus(id) {
            const data = loadData();
            const record = data.find(r => r.id === id);
            if (record) {
                record.status = record.status === 'active' ? 'done' : 'active';
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                syncToSheet({ action: "update", id: id, changes: { status: record.status } });
                renderList();
            }
        }

        function deleteRecord(id) {
            if (!confirm('確定要刪除這筆紀錄嗎？')) return;
            const data = loadData().filter(r => r.id !== id);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            renderList();
        }

        function handleLike(id) {
            const data = loadData();
            const record = data.find(r => r.id === id);
            if (record) {
                record.likes = (record.likes || 0) + 1;
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                syncToSheet({ action: "update", id: id, changes: { likes: record.likes } });
                renderList();
            }
        }

        function handleDislike(id) {
            const data = loadData();
            const record = data.find(r => r.id === id);
            if (record) {
                record.dislikes = (record.dislikes || 0) + 1;
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                syncToSheet({ action: "update", id: id, changes: { dislikes: record.dislikes } });
                renderList();
            }
        }

        function setCategoryFilter(cat) {
            currentCategory = cat;
            renderCategoryFilters();
            renderList();
        }

        function setStatusFilter(status) {
            currentStatus = status;
            document.querySelectorAll('.status-btn').forEach(btn => {
                if (btn.dataset.value === status) {
                    btn.className = "status-btn px-5 py-2 rounded-xl text-xs font-black transition-all bg-orange-500 text-white shadow-lg whitespace-nowrap";
                } else {
                    btn.className = "status-btn px-5 py-2 rounded-xl text-xs font-black transition-all text-slate-400 hover:text-slate-600 hover:bg-slate-50 whitespace-nowrap";
                }
            });
            renderList();
        }

        function renderCategoryFilters() {
            const container = document.getElementById('category-filters');
            const items = ['全部', ...CATEGORIES];
            container.innerHTML = items.map(cat => `
                <button onclick="setCategoryFilter('${cat}')" class="px-5 py-2 rounded-xl text-xs font-black transition-all whitespace-nowrap ${currentCategory === cat ? 'bg-slate-900 text-white shadow-lg' : 'text-slate-400 hover:text-slate-600 hover:bg-slate-50'}">
                    ${cat}
                </button>
            `).join('');
        }

        document.getElementById('post-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const newRecord = {
                restaurant: formData.get('restaurant'),
                category: formData.get('category'),
                mood: formData.get('mood'),
                content: formData.get('content'),
                imageData: currentUploadedImage,
                userId: currentUserId,
            };
            saveData(newRecord);
            e.target.reset();
            toggleModal(false);
            renderList();
        });

        // --- Auth & Avatar ---
        function loginAsAnonymous() { proceedLogin('anonymous'); }
        function loginWithAccount() {
            const name = document.getElementById('login-username').value.trim();
            if (!name) return alert('請輸入帳號名稱');
            proceedLogin(name);
        }

        function proceedLogin(userId) {
            currentUserId = userId;
            localStorage.setItem('foodie_user_id', userId);
            document.getElementById('display-username').textContent = userId === 'anonymous' ? 'Anonymous Guest' : userId;
            document.getElementById('user-avatar').src = getUserAvatar(userId);
            
            const auth = document.getElementById('auth-screen');
            auth.classList.add('fade-out');
            setTimeout(() => auth.classList.add('hidden'), 700);
            renderList();
        }

        function logout() {
            localStorage.removeItem('foodie_user_id');
            location.reload();
        }

        function getUserAvatar(userId) {
            const avatars = JSON.parse(localStorage.getItem('foodie_avatars') || '{}');
            return avatars[userId] || `https://api.dicebear.com/7.x/avataaars/svg?seed=${userId}`;
        }

        document.getElementById('avatar-upload-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file || !currentUserId) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const b64 = event.target.result;
                const avatars = JSON.parse(localStorage.getItem('foodie_avatars') || '{}');
                avatars[currentUserId] = b64;
                localStorage.setItem('foodie_avatars', JSON.stringify(avatars));
                document.getElementById('user-avatar').src = b64;
                renderList();
            };
            reader.readAsDataURL(file);
        });

        function initApp() {
            if (currentUserId) proceedLogin(currentUserId);
            renderCategoryFilters();
            lucide.createIcons();
        }

        initApp();
    </script>
</body>
</html>
